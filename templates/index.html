<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Quiz</title>

    <link rel="icon" type="image/png" sizes="32x32" href="static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="static/favicon-16x16.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: #fff8dc;
            color: #4a3728;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: linear-gradient(135deg, #fff8dc 0%, #f5ebcd 100%);
        }

        .container {
            background: linear-gradient(135deg, #fdf6e3 0%, #f5ebcd 100%);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3), inset 0 0 50px rgba(139, 69, 19, 0.1);
            width: 400px;
            border: 8px double #8b4513;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 3px solid #cd853f;
            border-radius: 6px;
            pointer-events: none;
        }

        h3 {
            margin-top: 0;
            text-align: center;
            color: #8b4513;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            letter-spacing: 3px;
            border-bottom: 4px double #8b4513;
            padding-bottom: 20px;
            font-weight: bold;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #4a3728;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 6px;
            border: 3px solid #cd853f;
            margin-bottom: 15px;
            font-size: 14px;
            background: #fffae5;
            color: #4a3728;
            font-family: 'Georgia', 'Times New Roman', serif;
            box-shadow: inset 0 0 10px rgba(139, 69, 19, 0.1);
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #8b4513;
            box-shadow: 0 0 15px rgba(218, 165, 32, 0.4), inset 0 0 10px rgba(139, 69, 19, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to bottom, #8b4513, #654321);
            color: #f5deb3;
            border: 3px solid #654321;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        input[type="submit"]:hover {
            background: linear-gradient(to bottom, #a0522d, #754c24);
            color: #fff8dc;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        input[type="submit"]:active {
            transform: translateY(0);
        }

        @media (max-width: 500px) {
            .container {
                width: 90%;
                padding: 30px;
            }
            
            h3 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>Gerar quiz</h3>
        <form method="post">
            
            

            <label for="texto">Insira o texto:</label>
            <textarea id="texto" name="texto" rows="8"></textarea>

            <input type="submit" value="Enviar">
        </form>
    </div>
</body>
</html>
